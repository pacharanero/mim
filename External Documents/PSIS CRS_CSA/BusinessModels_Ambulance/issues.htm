<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Project Issues</title>
<link href="./css/ea.css" rel="stylesheet" type="text/css" />
<script>
function initPage(src) {
	if(parent==this&&(this.location+"").indexOf('EARoot')!=-1)
		document.location=(this.location+"").substring(0,(this.location+"").indexOf('EARoot'))+"index"+(this.location+"").substring((this.location+"").lastIndexOf('.'))+"?goto="+((this.location+"").substring((this.location+"").indexOf('EARoot')+7,(this.location+"").lastIndexOf('.')).replace(/\//g,':').replace(/EA/g,""));
	else
		parent.initPage(src);
}
</script>
</head>
<body onload="initPage(this);" class="Content">
<div class="pageHeader"></div>
	<table border="0" cellspacing="0" cellpadding="0" class="Table">
		<tr>
			<td width="16%" class="TableHeading">Issue</td>
			<td width="8%" class="TableHeading">Date</td>
			<td width="8%" class="TableHeading">Owner</td>
			<td width="12%" class="TableHeading">Status</td>
			<td width="5%" class="TableHeading">Resolver</td>
			<td width="5%" class="TableHeading" style="white-space: pre">Date Resolved</td>
			<td width="10%" class="TableHeading">Resolution</td>
			<td width="32%" class="TableHeading">Notes</td>
		</tr>
						<tr>
				<td width="16%" class="TableRow">Sample Issue</td>
				<td width="8%" class="TableRow">02/04/2007</td>
				<td width="8%" class="TableRow">&nbsp;</td>
				<td width="12%" class="TableRow">Open</td>
				<td width="5%" class="TableRow">&nbsp;</td>
				<td width="5%" class="TableRow">&nbsp;</td>
				<td width="10%" class="TableRow">&nbsp;</td>
				<td width="32%" class="TableRow">This is a Sample Issue</td>
			</tr>
	</table><div class="pageFooter"></div>
 
</body>
</html>
